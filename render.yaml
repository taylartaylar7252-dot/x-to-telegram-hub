services:
  - type: web
    name: x-hub-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./app.db
      - key: SECRET_KEY
        value: supersecretkey
